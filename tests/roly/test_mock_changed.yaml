given:
  mock_tasks:
    - name: Create a temp folder
      mock:
        changed: true
        result_dict:
          path: "/tmp/fake"

test_cases:
  - name: "test_mock_basic"
    tasks:
      - name: Create a temp folder
        tempfile:
          state: directory
          suffix: build
        register: tmp_result

      - name: Assert result
        roly_assert:
          stmts:
            - actual: "{{ tmp_result.path }}"
              expected: "/tmp/fake"

            - actual: "{{ tmp_result.changed }}"
              mode: "is_true"
