YAKO_INTERNAL_INTEGRATION_TEST_CONFIG:
  is_passed: false
  search_keyword: >-
    [YAKO_ERROR]: Failed to assert outputs. task: Hello world,
    failed_asserts: 'Hello' != 'not_equal' - variable name: msg

YAKO_TEST_CASE_CONFIG:
  name: "test_assert_output_failed"
  path: "fake"
  given:
    state:
      - task: Hello world
        assert_outputs:
          - name: msg
            value: not_equal
  tasks:
    - name: Hello world
      debug:
        msg: Hello
