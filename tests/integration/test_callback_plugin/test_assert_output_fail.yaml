ROLY_INTERNAL_INTEGRATION_TEST_CONFIG:
  is_passed: false
  search_keyword: >-
    [ROLY_ERROR]: Failed to assert outputs. task: Hello world,
    failed_asserts: 'Hello' != 'not_equal' - variable name: msg

ROLY_TEST_CASE_CONFIG:
  name: "test_assert_output_failed"
  given:
    mock_tasks:
      - name: Hello world
        assert_outputs:
          - name: msg
            value: not_equal
  tasks:
    - name: Hello world
      debug:
        msg: Hello
