YAKO_INTERNAL_INTEGRATION_TEST_CONFIG:
  is_passed: false
  search_keyword: >-
    [YAKO_ERROR]: Failed to assert inputs. task: Hello world,
    failed_asserts: 'Hello' != 'World' - variable name: msg

YAKO_TEST_CASE_CONFIG:
  name: "test_assert_input_fail"
  path: "fake"
  given:
    mock_tasks:
      - name: Hello world
        assert_inputs:
          - name: msg
            value: World
  tasks:
    - name: Hello world
      debug:
        msg: Hello
