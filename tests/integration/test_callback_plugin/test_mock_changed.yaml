ROLY_INTERNAL_INTEGRATION_TEST_CONFIG:
  search_keyword: "Roly Mock module called. Task name: roly_mock, Original module: tempfile"

ROLY_TEST_CASE_CONFIG:
  name: "test_mock_changed"
  path: "fake"
  given:
    mock_tasks:
      - name: Create a temp folder
        mock:
          changed: true
          result_dicts:
            path: "/tmp/fake"
  tasks:
    - name: Create a temp folder
      tempfile:
        state: directory
        suffix: build
      register: tmp_result

    - name: Assert result
      roly_assert:
        stmts:
          - actual: "{{ tmp_result.path }}"
            expected: "/tmp/fake"

          - actual: "{{ tmp_result.changed }}"
            mode: "is_true"
