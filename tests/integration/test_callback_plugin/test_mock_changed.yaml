YAKO_INTERNAL_INTEGRATION_TEST_CONFIG:
  search_keyword: "Yako Mock module called. Task name: yako_mock, Original module: tempfile"

YAKO_TEST_CASE_CONFIG:
  name: "test_mock_changed"
  path: "fake"
  given:
    state:
      - task: Create a temp folder
        mock:
          changed: true
          result_dict:
            path: "/tmp/fake"
  tasks:
    - name: Create a temp folder
      tempfile:
        state: directory
        suffix: build
      register: tmp_result

    - name: Assert result
      yako_assert:
        stmts:
          - actual: "{{ tmp_result.path }}"
            expected: "/tmp/fake"

          - actual: "{{ tmp_result.changed }}"
            mode: "is_true"
