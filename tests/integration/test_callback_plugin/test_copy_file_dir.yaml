YAKO_INTERNAL_INTEGRATION_TEST_CONFIG:
  search_keyword: "File air.txt exists in yako workspace."

YAKO_TEST_CASE_CONFIG:
  name: "test_copy_file_dir"
  path: "fake"
  given:
    vars:
      tmp_dest_folder_name: "nested_fake"
    files:
      - "hello_air/"
      - "hello_air"
      - src: "hello_air"
        dest: "copy_of_hello_air"
      - src: "hello_air/"
        dest: "copy_of_hello_air2/"
      - src: "hello_air"
        dest: "/tmp/copy_of_hello_air"
      - src: "hello_air"
        dest: "{{ tmp_dest_folder_name }}/copy_of_hello_air"
  tasks:
    - name: Show yako workspace
      debug:
        msg: "{{ yako_workspace_dir }}"

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ yako_workspace_dir }}/hello_air/air.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File air.txt exists in yako workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ yako_workspace_dir }}/copy_of_hello_air/air.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File air.txt exists in yako workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ yako_workspace_dir }}/copy_of_hello_air2/\
              hello_air/air.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File air.txt exists in yako workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "/tmp/copy_of_hello_air/air.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File air.txt exists in yako workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ yako_workspace_dir }}/{{ tmp_dest_folder_name }}/\
              copy_of_hello_air/air.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File air.txt exists in yako workspace."
