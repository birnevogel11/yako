ROLY_INTERNAL_INTEGRATION_TEST_CONFIG:
  search_keyword: "File hello.txt exists in roly workspace."

ROLY_TEST_CASE_CONFIG:
  name: "test_copy_file_basic"
  path: "fake"
  given:
    extra_vars:
      tmp_dest_folder_name: "nested_fake"
    files:
      - "hello.txt"
      - src: "hello.txt"
        dest: "copy_of_hello.txt"
      - src: "hello.txt"
        dest: "nested/copy_of_hello.txt"
      - src: "hello.txt"
        dest: "/tmp/copy_of_hello.txt"
      - src: "hello.txt"
        dest: "{{ tmp_dest_folder_name }}/copy_of_hello.txt"
  tasks:
    - name: Show roly workspace
      debug:
        msg: "{{ roly_workspace_dir }}"

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ roly_workspace_dir }}/hello.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File hello.txt exists in roly workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ roly_workspace_dir }}/copy_of_hello.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File hello.txt exists in roly workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ roly_workspace_dir }}/nested/copy_of_hello.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File hello.txt exists in roly workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "/tmp/copy_of_hello.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File hello.txt exists in roly workspace."

    - block:
        - name: Check file exists in workspace
          stat:
            path: "{{ roly_workspace_dir }}/{{ tmp_dest_folder_name }}/\
              copy_of_hello.txt"
          register: hello_stat

        - name: Assert file exists in workspace
          assert:
            that:
              - hello_stat.stat.exists
            success_msg: "File hello.txt exists in roly workspace."
