ROLY_INTERNAL_INTEGRATION_TEST_CONFIG:
  search_keyword: "[ROLY]: mock module - Before: 'tempfile' Now: 'set_fact' with custom action"

ROLY_TEST_CASE_CONFIG:
  name: "test_mock_custom"
  path: "fake"
  given:
    mock_tasks:
      - name: Create a temp folder
        mock:
          custom_action:
            set_fact:
              msg: "Hello fake"
  tasks:
    - name: Create a temp folder
      tempfile:
        state: directory
        suffix: build
      register: tmp_result

    - name: Assert mock
      roly_assert:
        actual: "{{ msg }}"
        expected: "Hello fake"
