given:
  state:
    - task: Create a temp folder
      mock: {}

test_cases:
  - name: "test_given_basic"
    tasks:
      - name: Create a temp folder
        tempfile:
          state: directory
          suffix: build
        register: tmp_result

      - name: Check mock
        yako_assert:
          stmts:
            - actual: "{{ tmp_result.changed }}"
              mode: "is_false"

  - name: "test_given_override"
    given:
      state:
        - task: Create a temp folder
          mock:
            changed: true
            result_dict:
              path: "/tmp/fake"
    tasks:
      - name: Create a temp folder
        tempfile:
          state: directory
          suffix: build
        register: tmp_result

      - name: Check mock
        yako_assert:
          stmts:
            - actual: "{{ tmp_result.path }}"
              expected: "/tmp/fake"

            - actual: "{{ tmp_result.changed }}"
              mode: "is_true"
