test_cases:
  - name: "test_given_extra"
    given:
      extra_vars:
        given_extra: "whats_life_mean_to_you"
    tasks:
      - name: Hello world
        debug:
          var: given_extra

  - name: "test_task_extra_vars"
    given:
      mock_tasks:
        - name: "Mock target"
          extra_vars:
            task_extra_var: "whats_life_mean_to_you"
    tasks:
      - name: Mock target
        debug:
          msg: "A book: {{ task_extra_var }}"
