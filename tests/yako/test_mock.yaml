test_cases:
  - name: "test_mock_basic"
    given:
      mock_tasks:
        - name: Create a temp folder
          mock: {}
    tasks:
      - name: Create a temp folder
        tempfile:
          state: directory
          suffix: build

  - name: "test_mock_changed"
    given:
      mock_tasks:
        - name: Create a temp folder
          mock:
            changed: true
            result_dict:
              path: "/tmp/fake"
    tasks:
      - name: Create a temp folder
        tempfile:
          state: directory
          suffix: build
        register: tmp_result

      - name: Assert result
        yako_assert:
          stmts:
            - actual: "{{ tmp_result.path }}"
              expected: "/tmp/fake"

            - actual: "{{ tmp_result.changed }}"
              mode: "is_true"
