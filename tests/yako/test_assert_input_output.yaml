test_cases:
  - name: "test_assert_input"
    given:
      state:
        - task: Hello world
          assert_inputs:
            - name: msg
              value: Hello

    tasks:
      - name: Hello world
        debug:
          msg: Hello

  - name: "test_assert_input_deep"
    given:
      state:
        - task: Hello world
          assert_inputs:
            - name: msg.greeting
              value: Hello

    tasks:
      - name: Hello world
        debug:
          msg:
            greeting: Hello

  - name: "test_assert_input_not_equal"
    given:
      state:
        - task: Hello world
          assert_inputs:
            - name: msg
              value: World
              mode: "!="
    tasks:
      - name: Hello world
        debug:
          msg: Hello

  - name: "test_assert_output"
    given:
      state:
        - task: Hello world
          assert_outputs:
            - name: msg
              value: Hello
    tasks:
      - name: Hello world
        debug:
          msg: Hello

  - name: "test_assert_output_not_equal"
    given:
      state:
        - task: Hello world
          assert_outputs:
            - name: msg
              value: not_equal
              mode: "!="
    tasks:
      - name: Hello world
        debug:
          msg: Hello

  - name: "test_assert_output_deep"
    given:
      state:
        - task: Hello world
          assert_outputs:
            - name: msg.hellos[1]
              value: Bonjour le monde

    tasks:
      - name: Hello world
        debug:
          msg:
            hellos:
              - Hello World
              - Bonjour le monde

  - name: "test_assert_output_deeper"
    given:
      state:
        - task: Hello world
          assert_outputs:
            - name: "msg.hellos[1].greeting"
              value: Bonjour le monde

    tasks:
      - name: Hello world
        debug:
          msg:
            hellos:
              - greeting: Hello World
              - greeting: Bonjour le monde
